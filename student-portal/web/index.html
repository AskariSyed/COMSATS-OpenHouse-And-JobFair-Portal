<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="COMSATS University Islamabad Wah Campus Job Fair Student Portal">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Job Fair Portal">
  <link rel="apple-touch-icon" href="icons/Icon-192-optimized.png" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-192-optimized.png" type="image/png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/Icon-192-optimized.png"/>

  <title>CUI Wah Job Fair Student Portal</title>
  <link rel="manifest" href="manifest.json">

  <style>
    :root {
      color-scheme: light;
      --loader-bg: #f4f7fb;
      --loader-card: #ffffff;
      --loader-text: #1f2937;
      --loader-subtext: #6b7280;
      --loader-accent: #0ea5e9;
      --loader-accent-soft: rgba(14, 165, 233, 0.14);
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--loader-bg);
      font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      background:
        radial-gradient(circle at 20% 15%, rgba(14, 165, 233, 0.14), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(34, 197, 94, 0.12), transparent 36%),
        var(--loader-bg);
      transition: opacity 220ms ease;
    }

    #app-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-card {
      width: min(94vw, 440px);
      background: transparent;
      border-radius: 0;
      box-shadow: none;
      padding: 0;
      box-sizing: border-box;
      text-align: center;
    }

    .loader-logo-wrap {
      width: auto;
      height: auto;
      margin: 0 auto 16px;
      border-radius: 0;
      background: transparent;
      display: block;
      box-shadow: none;
    }

    .loader-logo {
      width: clamp(120px, 18vw, 190px);
      height: clamp(120px, 18vw, 190px);
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    .loader-title {
      margin: 0;
      color: var(--loader-text);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .loader-subtitle {
      margin: 8px 0 0;
      color: var(--loader-subtext);
      font-size: 14px;
      font-weight: 500;
    }

    .loader-spinner {
      width: 40px;
      height: 40px;
      margin: 20px auto 0;
      border-radius: 50%;
      border: 3px solid var(--loader-accent-soft);
      border-top-color: var(--loader-accent);
      animation: spin 0.95s linear infinite;
    }

    @media (max-width: 560px) {
      .loader-logo {
        width: clamp(96px, 28vw, 128px);
        height: clamp(96px, 28vw, 128px);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

  </style>
</head>
<body>
  <div id="app-loader" role="status" aria-live="polite" aria-label="Loading student portal">
    <div class="loader-card">
      <div class="loader-logo-wrap">
        <img class="loader-logo" src="icons/Icon-192-small.png" alt="Student Portal Logo" width="180" height="176" decoding="async" />
      </div>
      <h1 class="loader-title">Student Portal</h1>
      <p class="loader-subtitle">Loading, please wait...</p>
      <div class="loader-spinner" aria-hidden="true"></div>
    </div>
  </div>

  <script>
    (function () {
      var loader = document.getElementById('app-loader');
      var hidden = false;

      function hideLoader() {
        if (hidden || !loader) return;
        hidden = true;
        loader.classList.add('hidden');
        window.setTimeout(function () {
          if (loader && loader.parentNode) {
            loader.parentNode.removeChild(loader);
          }
        }, 260);
      }

      function maybeAppReady() {
        if (
          document.querySelector('flutter-view') ||
          document.querySelector('flt-glass-pane')
        ) {
          hideLoader();
          return true;
        }
        return false;
      }

      if (!maybeAppReady()) {
        var observer = new MutationObserver(function () {
          if (maybeAppReady()) {
            observer.disconnect();
          }
        });

        observer.observe(document.documentElement, {
          childList: true,
          subtree: true,
        });

        window.setTimeout(function () {
          observer.disconnect();
        }, 45000);
      }

      window.addEventListener('flutter-first-frame', hideLoader, { once: true });

      window.addEventListener('load', function () {
        window.setTimeout(maybeAppReady, 0);
      });
    })();
  </script>

  <script id="flutter-bootstrap-script" src="flutter_bootstrap.js" async></script>
</body>
</html>
