# Nginx configuration for Flutter Web (student portal)
server {
    listen 80;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/wasm application/octet-stream image/svg+xml;

    # Serve pre-compressed .gz files with no per-request CPU cost
    gzip_static on;

    # Reduce stat() syscalls for high-traffic static files
    open_file_cache          max=1000 inactive=20s;
    open_file_cache_valid    30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    root /usr/share/nginx/html;

    # index.html and service worker — never cache so users get fresh builds
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Icons — aggressive immutable cache; serve WebP variant when available
    location ^~ /icons/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept";
        expires 1y;
        try_files $uri =404;
    }

    # CanvasKit WASM assets — immutable, serve pre-compressed
    location ^~ /canvaskit/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        gzip_static on;
        expires 1y;
        try_files $uri =404;
    }

    # WASM files — set correct MIME type and serve pre-compressed
    location ~* \.wasm$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Content-Type "application/wasm";
        gzip_static on;
        expires 1y;
        try_files $uri =404;
    }

    # All other static assets — immutable cache (content-hashed by Flutter build)
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}