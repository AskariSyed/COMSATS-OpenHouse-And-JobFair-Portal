# Docker Compose Override for Local Development
# This file extends docker-compose.yml with development-specific settings
# Usage: docker-compose -f docker-compose.yml -f docker-compose.override.yml up

version: '3.8'

services:
  postgres:
    ports:
      - "5432:5432"  # Expose PostgreSQL for local testing
    environment:
      POSTGRES_PASSWORD: devpassword
      POSTGRES_USER: devuser
      POSTGRES_DB: jobfair_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  backend:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=postgres;Port=5432;Database=jobfair_dev;User Id=devuser;Password=devpassword;"
      CORS_AllowedOrigins: "http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:5173"
      JWT_SecretKey: "dev-secret-key-change-in-production-12345"
    ports:
      - "5158:5158"
    volumes:
      - ./Backend:/app/Backend
      - backend_dev_uploads:/app/Backend/uploads
    depends_on:
      postgres:
        condition: service_healthy

  admin-portal:
    environment:
      VITE_API_BASE_URL: http://localhost:5158
    ports:
      - "3001:80"
    volumes:
      - ./admin-portal/src:/app/src

  company-portal:
    environment:
      VITE_API_BASE_URL: http://localhost:5158
    ports:
      - "3002:80"
    volumes:
      - ./company-portal/src:/app/src

  student-portal:
    environment:
      BACKEND_BASE_URL: http://localhost:5158
    ports:
      - "3003:80"
    volumes:
      - ./student-portal/lib:/app/lib

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - admin-portal
      - company-portal
      - student-portal

volumes:
  postgres_dev_data:
  backend_dev_uploads:
