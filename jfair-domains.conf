server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name student.jfair.tech comsats.student.jfair.tech;
    root /var/www/student;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/wasm application/octet-stream image/svg+xml;

    # Serve pre-compressed .gz files directly (no CPU cost per request)
    gzip_static on;

    # Reduce filesystem stat() calls for frequently served files
    open_file_cache          max=2000 inactive=20s;
    open_file_cache_valid    60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    ssl_certificate /etc/letsencrypt/live/jfair.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jfair.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location /api/ {
        proxy_pass http://127.0.0.1:5158/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /hubs/ {
        proxy_pass http://127.0.0.1:5158/hubs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:5158/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location ^~ /canvaskit/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
        try_files $uri =404;
    }

    location ~* \.wasm$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Content-Type "application/wasm" always;
        expires 1y;
        gzip_static on;
        try_files $uri =404;
    }

    # Icons served at small size — aggressive cache, WebP first
    location ^~ /icons/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
        add_header Vary "Accept" always;
        try_files $uri =404;
    }

    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
        try_files $uri =404;
    }

    location /downloads/ {
        autoindex on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
