global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:9090']
        labels:
          host: 'askari'

  - job_name: node_exporter
    static_configs:
      - targets: ['127.0.0.1:9100']
        labels:
          host: 'askari'

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:3100']
        labels:
          host: 'askari'
