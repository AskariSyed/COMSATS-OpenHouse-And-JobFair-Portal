name: Build and Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ${{ secrets.EC2_USER }}
  BACKEND_URL: ${{ secrets.BACKEND_URL }}
  VITE_SERVER_URL: ${{ secrets.BACKEND_URL }}
  VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
  VITE_FIREBASE_VAPID_KEY: ${{ secrets.FIREBASE_VAPID_KEY }}
  VITE_BACKEND_URL: ${{ secrets.BACKEND_URL }}
  VITE_API_BASE_URL: ${{ secrets.BACKEND_URL }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Detect changed projects
      id: changes
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "admin=true" >> "$GITHUB_OUTPUT"
          echo "company=true" >> "$GITHUB_OUTPUT"
          echo "landing=true" >> "$GITHUB_OUTPUT"
          echo "student=true" >> "$GITHUB_OUTPUT"
          echo "backend=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Safely get changed files using conditional fallbacks
        if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
          changed_files="$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")"
        else
          changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null || git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")"
        fi

        echo "Changed files:"
        echo "$changed_files"

        if echo "$changed_files" | grep -q '^admin-portal/'; then echo "admin=true" >> "$GITHUB_OUTPUT"; else echo "admin=false" >> "$GITHUB_OUTPUT"; fi
        if echo "$changed_files" | grep -q '^company-portal/'; then echo "company=true" >> "$GITHUB_OUTPUT"; else echo "company=false" >> "$GITHUB_OUTPUT"; fi
        if echo "$changed_files" | grep -q '^landing-page/'; then echo "landing=true" >> "$GITHUB_OUTPUT"; else echo "landing=false" >> "$GITHUB_OUTPUT"; fi
        if echo "$changed_files" | grep -q '^student-portal/'; then echo "student=true" >> "$GITHUB_OUTPUT"; else echo "student=false" >> "$GITHUB_OUTPUT"; fi
        if echo "$changed_files" | grep -q '^Backend/'; then
          echo "backend=true" >> "$GITHUB_OUTPUT"
          # If backend changed, always prepare/run migration bundle.
          # EF bundle is idempotent and applies only pending migrations.
          echo "migrations=true" >> "$GITHUB_OUTPUT"
        else
          echo "backend=false" >> "$GITHUB_OUTPUT"
          echo "migrations=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Show changed projects
      run: |
        echo "Admin:      ${{ steps.changes.outputs.admin }}"
        echo "Company:    ${{ steps.changes.outputs.company }}"
        echo "Landing:    ${{ steps.changes.outputs.landing }}"
        echo "Student:    ${{ steps.changes.outputs.student }}"
        echo "Backend:    ${{ steps.changes.outputs.backend }}"
        echo "Migrations: ${{ steps.changes.outputs.migrations }}"
    
    # Setup Node.js for React apps
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          admin-portal/package-lock.json
          company-portal/package-lock.json
          landing-page/package-lock.json
    
    # Setup Flutter for Student portal
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true

    # Setup Java for Android APK build
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
    
    # Setup .NET for Backend
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    # Build Admin Portal
    - name: Build Admin Portal
      if: steps.changes.outputs.admin == 'true'
      run: |
        cd admin-portal
        npm ci
        npm run build
        if [ ! -d "dist" ]; then
          echo "Admin build output missing"
          exit 1
        fi
    
    # Build Company Portal
    - name: Build Company Portal
      if: steps.changes.outputs.company == 'true'
      run: |
        cd company-portal
        npm ci
        npm run build
        if [ ! -d "dist" ]; then
          echo "Company build output missing"
          exit 1
        fi
    
    # Build Landing Page
    - name: Build Landing Page
      if: steps.changes.outputs.landing == 'true'
      run: |
        cd landing-page
        npm ci
        npm run build
        if [ ! -d "dist" ]; then
          echo "Landing build output missing"
          exit 1
        fi
    
    # Build Student Portal (Flutter Web + APK)
    - name: Build Student Portal
      if: steps.changes.outputs.student == 'true'
      run: |
        cd student-portal
        flutter pub get
        flutter build web --release --no-wasm-dry-run \
          --dart-define=BACKEND_BASE_URL=${{ env.BACKEND_URL }} \
          --dart-define=APP_ENV=production
        if [ ! -d "build/web" ]; then
          echo "Student build output missing"
          exit 1
        fi
        flutter build apk --release
        if [ ! -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
          echo "Student APK output missing"
          exit 1
        fi
    
    # Build Backend (.NET)
    - name: Build Backend
      if: steps.changes.outputs.backend == 'true'
      run: |
        cd Backend
        dotnet restore
        dotnet build --configuration Release
        dotnet publish JobFairPortal.csproj --configuration Release --output publish

    # Build EF Migrations Bundle (whenever backend changes)
    - name: Build EF Migrations Bundle
      if: steps.changes.outputs.migrations == 'true'
      run: |
        cd Backend
        # Install dotnet-ef pinned to EF Core 9.x (matches project package versions)
        dotnet tool uninstall --global dotnet-ef || true
        dotnet tool install --global dotnet-ef --version 9.*
        export PATH="$PATH:$HOME/.dotnet/tools"
        # Restore runtime-specific assets required by migrations bundle
        dotnet restore JobFairPortal.csproj -r linux-x64
        # Build a self-contained migrations bundle for linux-x64
        # The bundle is a standalone executable — no dotnet runtime needed on the server
        dotnet ef migrations bundle \
          --project JobFairPortal.csproj \
          --runtime linux-x64 \
          --self-contained \
          --output publish/efbundle \
          --force
        echo "Migrations bundle created:"
        ls -lh publish/efbundle
    
    # Create deployment artifacts
    - name: Package artifacts
      if: always()
      run: |
        mkdir -p deploy-artifacts
        
        if [ "${{ steps.changes.outputs.admin }}" = "true" ]; then
          tar -czf deploy-artifacts/admin.tar.gz -C admin-portal/dist .
        fi
        if [ "${{ steps.changes.outputs.company }}" = "true" ]; then
          tar -czf deploy-artifacts/company.tar.gz -C company-portal/dist .
        fi
        if [ "${{ steps.changes.outputs.landing }}" = "true" ]; then
          tar -czf deploy-artifacts/landing.tar.gz -C landing-page/dist .
        fi
        if [ "${{ steps.changes.outputs.student }}" = "true" ]; then
          tar -czf deploy-artifacts/student.tar.gz -C student-portal/build/web .
          cp student-portal/build/app/outputs/flutter-apk/app-release.apk deploy-artifacts/student-portal.apk
        fi
        if [ "${{ steps.changes.outputs.backend }}" = "true" ]; then
          tar -czf deploy-artifacts/backend.tar.gz -C Backend/publish .
        fi
        # Package the migrations bundle separately so it can be run before service restart
        if [ "${{ steps.changes.outputs.migrations }}" = "true" ]; then
          if [ -f Backend/publish/efbundle ]; then
            cp Backend/publish/efbundle deploy-artifacts/efbundle
            echo "Migrations bundle included in artifacts."
          else
            echo "WARNING: efbundle not found; skipping migration artifact packaging."
          fi
        fi
        
        echo "Artifacts packaged:"
        ls -lh deploy-artifacts/
    
    # Setup SSH and deploy to EC2
    - name: Deploy to EC2
      if: always()
      env:
        EC2_PEM_KEY: ${{ secrets.EC2_PEM_KEY }}
      run: |
        # Setup SSH
        mkdir -p ~/.ssh
        echo "$EC2_PEM_KEY" > ~/.ssh/jobfair-key.pem
        chmod 600 ~/.ssh/jobfair-key.pem
        echo "StrictHostKeyChecking=no" >> ~/.ssh/config
        
        # Upload artifacts to EC2
        echo "Uploading artifacts to EC2..."
        if [ "${{ steps.changes.outputs.admin }}" = "true" ]; then
          scp -i ~/.ssh/jobfair-key.pem -o ConnectTimeout=10 -o StrictHostKeyChecking=no deploy-artifacts/admin.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/admin.tar.gz
        fi
        if [ "${{ steps.changes.outputs.company }}" = "true" ]; then
          scp -i ~/.ssh/jobfair-key.pem -o ConnectTimeout=10 -o StrictHostKeyChecking=no deploy-artifacts/company.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/company.tar.gz
        fi
        if [ "${{ steps.changes.outputs.landing }}" = "true" ]; then
          scp -i ~/.ssh/jobfair-key.pem -o ConnectTimeout=10 -o StrictHostKeyChecking=no deploy-artifacts/landing.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/landing.tar.gz
        fi
        if [ "${{ steps.changes.outputs.student }}" = "true" ]; then
          scp -i ~/.ssh/jobfair-key.pem -o ConnectTimeout=10 -o StrictHostKeyChecking=no deploy-artifacts/student.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/student.tar.gz
          scp -i ~/.ssh/jobfair-key.pem -o ConnectTimeout=10 -o StrictHostKeyChecking=no deploy-artifacts/student-portal.apk ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/student-portal.apk
        fi
        if [ "${{ steps.changes.outputs.backend }}" = "true" ]; then
          scp -i ~/.ssh/jobfair-key.pem -o ConnectTimeout=10 -o StrictHostKeyChecking=no deploy-artifacts/backend.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/backend.tar.gz
        fi
        if [ "${{ steps.changes.outputs.migrations }}" = "true" ]; then
          if [ -f deploy-artifacts/efbundle ]; then
            scp -i ~/.ssh/jobfair-key.pem -o ConnectTimeout=10 -o StrictHostKeyChecking=no deploy-artifacts/efbundle ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/efbundle
          else
            echo "WARNING: deploy-artifacts/efbundle missing; skipping migration upload."
          fi
        fi
        
        # Execute remote deployment script
        echo "Running remote deployment..."
        ssh -i ~/.ssh/jobfair-key.pem -o ConnectTimeout=10 -o StrictHostKeyChecking=no \
          ${{ env.EC2_USER }}@${{ env.EC2_HOST }} 'bash -s' << 'DEPLOY_SCRIPT'
        set -euo pipefail
        
        echo "==> Creating directories..."
        sudo mkdir -p /var/www/admin /var/www/company /var/www/student /var/www/downloads /var/www/jfair /var/www/api
        
        echo "==> Installing system dependencies..."
        sudo apt-get update -y
        sudo apt-get install -y tar gzip
        
        echo "==> Deploying Admin Portal..."
        if [ "${{ steps.changes.outputs.admin }}" = "true" ]; then
          sudo rm -rf /var/www/admin/*
          sudo tar -xzf /tmp/admin.tar.gz -C /var/www/admin
          sudo chown -R www-data:www-data /var/www/admin
        fi
        
        echo "==> Deploying Company Portal..."
        if [ "${{ steps.changes.outputs.company }}" = "true" ]; then
          sudo rm -rf /var/www/company/*
          sudo tar -xzf /tmp/company.tar.gz -C /var/www/company
          sudo chown -R www-data:www-data /var/www/company
        fi
        
        echo "==> Deploying Student Portal..."
        if [ "${{ steps.changes.outputs.student }}" = "true" ]; then
          sudo rm -rf /var/www/student/*
          sudo tar -xzf /tmp/student.tar.gz -C /var/www/student
          sudo mkdir -p /var/www/downloads
          sudo cp /tmp/student-portal.apk /var/www/downloads/student-portal.apk
          sudo chown -R www-data:www-data /var/www/student
          sudo chown -R www-data:www-data /var/www/downloads
        fi
        
        echo "==> Deploying Landing Page..."
        if [ "${{ steps.changes.outputs.landing }}" = "true" ]; then
          sudo rm -rf /var/www/jfair/*
          sudo tar -xzf /tmp/landing.tar.gz -C /var/www/jfair
          sudo chown -R www-data:www-data /var/www/jfair
        fi
        
        echo "==> Deploying Backend API..."
        if [ "${{ steps.changes.outputs.backend }}" = "true" ]; then
          sudo rm -rf /var/www/api/*
          sudo tar -xzf /tmp/backend.tar.gz -C /var/www/api
          sudo chown -R www-data:www-data /var/www/api
        fi

        echo "==> Running EF Database Migrations..."
        if [ "${{ steps.changes.outputs.migrations }}" = "true" ]; then
          if [ -f /tmp/efbundle ]; then
            sudo chmod +x /tmp/efbundle
            # Run the self-contained migrations bundle using the production appsettings
            # The bundle reads the connection string from appsettings.Production.json in /var/www/api
            if [ ! -f /var/www/api/appsettings.Production.json ]; then
              echo "ERROR: /var/www/api/appsettings.Production.json not found"
              exit 1
            fi
            DB_CONN="$(sudo python3 -c "import json; p='/var/www/api/appsettings.Production.json'; d=json.load(open(p, 'r', encoding='utf-8')); print(((d.get('ConnectionStrings') or {}).get('DefaultConnection') or ''))" 2>/dev/null || true)"
            if [ -z "$DB_CONN" ]; then
              echo "ERROR: Could not extract DefaultConnection from /var/www/api/appsettings.Production.json"
              exit 1
            fi

            # Force IPv4 for migration connectivity (some EC2 networks can't route IPv6)
            DB_CONN_FOR_MIGRATION="$DB_CONN"
            DB_HOST="$(echo "$DB_CONN" | sed -n 's/.*Host=\([^;]*\).*/\1/p')"
            if [ -n "$DB_HOST" ]; then
              echo "==> Resolving DB host: $DB_HOST"
              # Use broadly-supported resolver path; never fail deployment if lookup command fails.
              DB_HOST_IPV4="$(getent hosts "$DB_HOST" 2>/dev/null | awk '{print $1}' | grep -E '^[0-9]+\.' | head -n 1 || true)"
              if [ -n "$DB_HOST_IPV4" ]; then
                DB_CONN_FOR_MIGRATION="${DB_CONN/Host=$DB_HOST;/Host=$DB_HOST_IPV4;}"
                echo "==> Using IPv4 host for migrations: $DB_HOST_IPV4"
              else
                echo "WARNING: Could not resolve IPv4 for $DB_HOST; using original host."
              fi
            fi

            sudo env ConnectionStrings__DefaultConnection="$DB_CONN_FOR_MIGRATION" /tmp/efbundle --connection "$DB_CONN_FOR_MIGRATION"
            echo "==> EF migrations applied successfully!"
            sudo rm -f /tmp/efbundle
          else
            echo "WARNING: /tmp/efbundle missing on server; skipping migrations."
          fi
        else
          echo "==> No new migrations detected — skipping database update."
        fi

        echo "==> Restarting backend service..."
        if [ "${{ steps.changes.outputs.backend }}" = "true" ]; then
          restart_and_verify() {
            svc="$1"
            echo "==> Restarting service: $svc"
            sudo systemctl restart "$svc"
            if ! sudo systemctl is-active --quiet "$svc"; then
              echo "ERROR: Service '$svc' is not active after restart"
              sudo systemctl status "$svc" --no-pager -l || true
              sudo journalctl -u "$svc" -n 100 --no-pager || true
              exit 1
            fi
            echo "==> Service '$svc' is active"
          }

          if systemctl list-unit-files | grep -q '^jobfair-backend.service'; then
            restart_and_verify jobfair-backend
          elif systemctl list-unit-files | grep -q '^jobfair-api.service'; then
            restart_and_verify jobfair-api
          elif systemctl list-unit-files | grep -q '^kestrel-jobfair.service'; then
            restart_and_verify kestrel-jobfair
          else
            echo "WARNING: No known backend systemd service found (jobfair-backend/jobfair-api/kestrel-jobfair)."
            echo "Please restart your backend service manually in this script."
          fi
        fi
        
        # Set proper permissions
        sudo find /var/www/admin /var/www/company /var/www/student /var/www/jfair -type d -exec chmod 755 {} \;
        sudo find /var/www/admin /var/www/company /var/www/student /var/www/jfair -type f -exec chmod 644 {} \;
        
        echo "==> Validating Nginx configuration..."
        sudo nginx -t
        
        echo "==> Reloading Nginx..."
        sudo systemctl reload nginx
        
        echo "==> Deployment completed successfully!"
        DEPLOY_SCRIPT
        
        # Cleanup
        rm ~/.ssh/jobfair-key.pem
    
    - name: Cleanup
      if: always()
      run: rm -rf deploy-artifacts ~/.ssh/jobfair-key.pem
