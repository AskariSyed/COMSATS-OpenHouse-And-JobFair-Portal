name: Build and Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ${{ secrets.EC2_USER }}
  BACKEND_URL: ${{ secrets.BACKEND_URL }}
  VITE_SERVER_URL: ${{ secrets.BACKEND_URL }}
  VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
  VITE_FIREBASE_VAPID_KEY: ${{ secrets.FIREBASE_VAPID_KEY }}
  VITE_BACKEND_URL: ${{ secrets.BACKEND_URL }}
  VITE_API_BASE_URL: ${{ secrets.BACKEND_URL }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Detect changed projects
      id: changes
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "admin=true" >> "$GITHUB_OUTPUT"
          echo "company=true" >> "$GITHUB_OUTPUT"
          echo "landing=true" >> "$GITHUB_OUTPUT"
          echo "student=true" >> "$GITHUB_OUTPUT"
          echo "backend=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Safely get changed files using conditional fallbacks
        if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
          changed_files="$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")"
        else
          changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null || git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")"
        fi

        echo "Changed files:"
        echo "$changed_files"

        if echo "$changed_files" | grep -q '^admin-portal/'; then echo "admin=true" >> "$GITHUB_OUTPUT"; else echo "admin=false" >> "$GITHUB_OUTPUT"; fi
        if echo "$changed_files" | grep -q '^company-portal/'; then echo "company=true" >> "$GITHUB_OUTPUT"; else echo "company=false" >> "$GITHUB_OUTPUT"; fi
        if echo "$changed_files" | grep -q '^landing-page/'; then echo "landing=true" >> "$GITHUB_OUTPUT"; else echo "landing=false" >> "$GITHUB_OUTPUT"; fi
        if echo "$changed_files" | grep -q '^student-portal/'; then echo "student=true" >> "$GITHUB_OUTPUT"; else echo "student=false" >> "$GITHUB_OUTPUT"; fi
        if echo "$changed_files" | grep -q '^Backend/'; then echo "backend=true" >> "$GITHUB_OUTPUT"; else echo "backend=false" >> "$GITHUB_OUTPUT"; fi

    - name: Show changed projects
      run: |
        echo "Admin:   ${{ steps.changes.outputs.admin }}"
        echo "Company: ${{ steps.changes.outputs.company }}"
        echo "Landing: ${{ steps.changes.outputs.landing }}"
        echo "Student: ${{ steps.changes.outputs.student }}"
        echo "Backend: ${{ steps.changes.outputs.backend }}"

    - name: Validate Firebase web secrets
      run: |
        set -e

        fail=false

        if [ -z "${VITE_FIREBASE_API_KEY}" ]; then
          echo "ERROR: FIREBASE_API_KEY secret is missing."
          fail=true
        fi

        if [ -z "${VITE_FIREBASE_APP_ID}" ]; then
          echo "ERROR: FIREBASE_APP_ID secret is missing."
          fail=true
        fi

        if [ -z "${VITE_FIREBASE_PROJECT_ID}" ]; then
          echo "ERROR: FIREBASE_PROJECT_ID secret is missing."
          fail=true
        fi

        if [ -z "${VITE_FIREBASE_VAPID_KEY}" ]; then
          echo "ERROR: FIREBASE_VAPID_KEY secret is missing."
          fail=true
        fi

        if ! printf '%s' "${VITE_FIREBASE_API_KEY}" | grep -Eq '^AIza[0-9A-Za-z_-]{20,}$'; then
          echo "ERROR: FIREBASE_API_KEY format looks invalid for a Firebase Web API key."
          fail=true
        fi

        if ! printf '%s' "${VITE_FIREBASE_APP_ID}" | grep -Eq '^[0-9]+:[0-9]+:web:[0-9a-f]+$'; then
          echo "ERROR: FIREBASE_APP_ID format looks invalid. Expected <projectNumber>:<senderId>:web:<hash>."
          fail=true
        fi

        if ! printf '%s' "${VITE_FIREBASE_VAPID_KEY}" | tr -d '\r\n\t ' | grep -Eq '^[A-Za-z0-9_-]{80,}$'; then
          echo "ERROR: FIREBASE_VAPID_KEY format looks invalid."
          fail=true
        fi

        if [ "$fail" = true ]; then
          echo "Firebase secret validation failed. Fix GitHub Secrets and rerun."
          exit 1
        fi

        echo "Firebase secret validation passed."
    
    # Setup Node.js for React apps
    - name: Setup Node.js
      if: steps.changes.outputs.admin == 'true' || steps.changes.outputs.company == 'true' || steps.changes.outputs.landing == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          admin-portal/package-lock.json
          company-portal/package-lock.json
          landing-page/package-lock.json
    
    # Setup Flutter for Student portal
    - name: Setup Flutter (Pinned)
      if: steps.changes.outputs.student == 'true'
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.35.0'
        channel: stable
        cache: false

    # Setup Java for Android APK build
    - name: Setup Java
      if: steps.changes.outputs.student == 'true'
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
    
    # Setup .NET for Backend
    - name: Setup .NET
      if: steps.changes.outputs.backend == 'true'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    # Build Admin Portal
    - name: Build Admin Portal
      if: steps.changes.outputs.admin == 'true'
      run: |
        cd admin-portal
        npm ci
        npm run build
        if [ ! -d "dist" ]; then
          echo "Admin build output missing"
          exit 1
        fi
    
    # Build Company Portal
    - name: Build Company Portal
      if: steps.changes.outputs.company == 'true'
      run: |
        cd company-portal
        npm ci
        npm run build
        if [ ! -d "dist" ]; then
          echo "Company build output missing"
          exit 1
        fi
    
    # Build Landing Page
    - name: Build Landing Page
      if: steps.changes.outputs.landing == 'true'
      run: |
        cd landing-page
        npm ci
        npm run build
        if [ ! -d "dist" ]; then
          echo "Landing build output missing"
          exit 1
        fi
    
    # Build Student Portal (Flutter Web + APK)
    - name: Build Student Portal
      if: steps.changes.outputs.student == 'true'
      run: |
        cd student-portal
        flutter pub get
        flutter build web --release \
          --dart-define=BACKEND_BASE_URL=${{ env.BACKEND_URL }} \
          --dart-define=APP_ENV=production
        if [ ! -d "build/web" ]; then
          echo "Student build output missing"
          exit 1
        fi
        flutter build apk --release \
          --dart-define=BACKEND_BASE_URL=${{ env.BACKEND_URL }} \
          --dart-define=APP_ENV=production
        if [ ! -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
          echo "Student APK output missing"
          exit 1
        fi
    
    # Build Backend (.NET)
    - name: Build Backend
      if: steps.changes.outputs.backend == 'true'
      run: |
        cd Backend
        dotnet restore
        dotnet build --configuration Release
        dotnet publish --configuration Release --output publish
        if [ ! -f "publish/JobFairPortal.dll" ]; then
          echo "Backend publish output missing: Backend/publish/JobFairPortal.dll"
          ls -la publish || true
          exit 1
        fi
    
    # Create deployment artifacts
    - name: Package artifacts
      if: success()
      run: |
        mkdir -p deploy-artifacts
        
        if [ "${{ steps.changes.outputs.admin }}" = "true" ]; then
          tar -czf deploy-artifacts/admin.tar.gz -C admin-portal/dist .
        fi
        if [ "${{ steps.changes.outputs.company }}" = "true" ]; then
          tar -czf deploy-artifacts/company.tar.gz -C company-portal/dist .
        fi
        if [ "${{ steps.changes.outputs.landing }}" = "true" ]; then
          tar -czf deploy-artifacts/landing.tar.gz -C landing-page/dist .
        fi
        if [ "${{ steps.changes.outputs.student }}" = "true" ]; then
          tar -czf deploy-artifacts/student.tar.gz -C student-portal/build/web .
          cp student-portal/build/app/outputs/flutter-apk/app-release.apk deploy-artifacts/student-portal.apk
        fi
        if [ "${{ steps.changes.outputs.backend }}" = "true" ]; then
          if [ ! -d "Backend/publish" ]; then
            echo "Backend publish directory missing: Backend/publish"
            exit 1
          fi
          tar -czf deploy-artifacts/backend.tar.gz -C Backend/publish .
          if [ ! -s "deploy-artifacts/backend.tar.gz" ]; then
            echo "Failed to create backend artifact: deploy-artifacts/backend.tar.gz"
            exit 1
          fi
        fi
        
        echo "Artifacts packaged:"
        ls -lh deploy-artifacts/
    
    # Setup SSH and deploy to EC2
    - name: Deploy to EC2
      if: success()
      env:
        EC2_PEM_KEY: ${{ secrets.EC2_PEM_KEY }}
        FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
      run: |
        # Setup SSH
        mkdir -p ~/.ssh
        echo "$EC2_PEM_KEY" > ~/.ssh/jobfair-key.pem
        chmod 600 ~/.ssh/jobfair-key.pem
        echo "StrictHostKeyChecking=no" >> ~/.ssh/config
        
        # Upload artifacts to EC2
        echo "Uploading artifacts to EC2..."
        if [ "${{ steps.changes.outputs.admin }}" = "true" ]; then
          scp -i ~/.ssh/jobfair-key.pem -o ConnectTimeout=10 -o StrictHostKeyChecking=no deploy-artifacts/admin.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/admin.tar.gz
        fi
        if [ "${{ steps.changes.outputs.company }}" = "true" ]; then
          scp -i ~/.ssh/jobfair-key.pem -o ConnectTimeout=10 -o StrictHostKeyChecking=no deploy-artifacts/company.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/company.tar.gz
        fi
        if [ "${{ steps.changes.outputs.landing }}" = "true" ]; then
          scp -i ~/.ssh/jobfair-key.pem -o ConnectTimeout=10 -o StrictHostKeyChecking=no deploy-artifacts/landing.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/landing.tar.gz
        fi
        if [ "${{ steps.changes.outputs.student }}" = "true" ]; then
          scp -i ~/.ssh/jobfair-key.pem -o ConnectTimeout=10 -o StrictHostKeyChecking=no deploy-artifacts/student.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/student.tar.gz
          scp -i ~/.ssh/jobfair-key.pem -o ConnectTimeout=10 -o StrictHostKeyChecking=no deploy-artifacts/student-portal.apk ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/student-portal.apk
        fi
        if [ "${{ steps.changes.outputs.backend }}" = "true" ]; then
          scp -i ~/.ssh/jobfair-key.pem -o ConnectTimeout=10 -o StrictHostKeyChecking=no deploy-artifacts/backend.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/backend.tar.gz
        fi
        
        # Execute remote deployment script
        echo "Running remote deployment..."
        ssh -i ~/.ssh/jobfair-key.pem -o ConnectTimeout=10 -o StrictHostKeyChecking=no \
          ${{ env.EC2_USER }}@${{ env.EC2_HOST }} 'bash -s' << DEPLOY_SCRIPT
        set -e
        
        echo "==> Creating directories..."
        sudo mkdir -p /var/www/admin /var/www/company /var/www/student /var/www/student/downloads /var/www/jfair /var/www/api /var/www/uploads
        
        echo "==> Installing system dependencies..."
        sudo apt-get update -y
        sudo apt-get install -y tar gzip
        
        echo "==> Deploying Admin Portal..."
        if [ "${{ steps.changes.outputs.admin }}" = "true" ]; then
          sudo rm -rf /var/www/admin/*
          sudo tar -xzf /tmp/admin.tar.gz -C /var/www/admin
          sudo chown -R www-data:www-data /var/www/admin
        fi
        
        echo "==> Deploying Company Portal..."
        if [ "${{ steps.changes.outputs.company }}" = "true" ]; then
          sudo rm -rf /var/www/company/*
          sudo tar -xzf /tmp/company.tar.gz -C /var/www/company
          sudo chown -R www-data:www-data /var/www/company
        fi
        
        echo "==> Deploying Student Portal..."
        if [ "${{ steps.changes.outputs.student }}" = "true" ]; then
          sudo rm -rf /var/www/student/*
          sudo tar -xzf /tmp/student.tar.gz -C /var/www/student
          sudo mkdir -p /var/www/student/downloads
          sudo cp /tmp/student-portal.apk /var/www/student/downloads/student-portal.apk
          sudo chown -R www-data:www-data /var/www/student
        fi
        
        echo "==> Deploying Landing Page..."
        if [ "${{ steps.changes.outputs.landing }}" = "true" ]; then
          sudo rm -rf /var/www/jfair/*
          sudo tar -xzf /tmp/landing.tar.gz -C /var/www/jfair
          sudo chown -R www-data:www-data /var/www/jfair
        fi
        
        echo "==> Deploying Backend API..."
        if [ "${{ steps.changes.outputs.backend }}" = "true" ]; then
          sudo rm -rf /var/www/api/*
          sudo tar -xzf /tmp/backend.tar.gz -C /var/www/api

          # Keep uploads persistent across backend deployments.
          sudo mkdir -p /var/www/uploads /var/www/api/wwwroot
          sudo rm -rf /var/www/api/uploads /var/www/api/wwwroot/uploads 
          sudo ln -sfn /var/www/uploads /var/www/api/uploads
          sudo ln -sfn /var/www/uploads /var/www/api/wwwroot/uploads

          sudo chown -R www-data:www-data /var/www/api
          sudo chown -h www-data:www-data /var/www/api/uploads /var/www/api/wwwroot/uploads
        fi

        
        echo "==> Creating Firebase config..."

        sudo mkdir -p /var/www/api/config

        if [ -z "$FIREBASE_CONFIG_JSON" ]; then
          echo "ERROR: FIREBASE_CONFIG_JSON secret is missing."
          exit 1
        fi

        cat > /tmp/firebase-config.json << FIREBASE_EOF
        $FIREBASE_CONFIG_JSON
        FIREBASE_EOF
        sudo cp /tmp/firebase-config.json /var/www/api/config/hirebridge-c28e9-firebase-adminsdk-fbsvc-22c59be5ca.json
        sudo cp /var/www/api/config/hirebridge-c28e9-firebase-adminsdk-fbsvc-22c59be5ca.json /var/www/api/config/firebase.json
        rm /tmp/firebase-config.json

        sudo chown www-data:www-data /var/www/api/config/hirebridge-c28e9-firebase-adminsdk-fbsvc-22c59be5ca.json /var/www/api/config/firebase.json

        echo "==> Configuring Backend systemd service..."
        if [ "${{ steps.changes.outputs.backend }}" = "true" ]; then
          printf '%s\n' \
            '[Unit]' \
            'Description=JobFair Backend API' \
            'After=network.target' \
            '' \
            '[Service]' \
            'WorkingDirectory=/var/www/api' \
            'ExecStart=/usr/bin/dotnet /var/www/api/JobFairPortal.dll' \
            'Restart=always' \
            'RestartSec=5' \
            'KillSignal=SIGINT' \
            'SyslogIdentifier=jobfair-backend' \
            'User=www-data' \
            'Environment=ASPNETCORE_ENVIRONMENT=Production' \
            'Environment=DOTNET_PRINT_TELEMETRY_MESSAGE=false' \
            '' \
            '[Install]' \
            'WantedBy=multi-user.target' \
            | sudo tee /etc/systemd/system/jobfair-backend.service > /dev/null

          sudo systemctl daemon-reload
          sudo systemctl enable jobfair-backend
          sudo systemctl restart jobfair-backend
          sudo systemctl status jobfair-backend --no-pager -l || true
        fi
        
        # Set proper permissions
        sudo find /var/www/admin /var/www/company /var/www/student /var/www/jfair -type d -exec chmod 755 {} \;
        sudo find /var/www/admin /var/www/company /var/www/student /var/www/jfair -type f -exec chmod 644 {} \;
        
        echo "==> Validating Nginx configuration..."
        sudo nginx -t
        
        echo "==> Reloading Nginx..."
        sudo systemctl reload nginx
        
        echo "==> Deployment completed successfully!"
        DEPLOY_SCRIPT
        
        # Cleanup
        rm ~/.ssh/jobfair-key.pem
    
    - name: Cleanup
      if: always()
      run: rm -rf deploy-artifacts ~/.ssh/jobfair-key.pem